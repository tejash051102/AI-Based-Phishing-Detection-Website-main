services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  ai-service:
    build:
      context: ./ai-service
    ports:
      - "8000:8000"

  backend:
    build:
      context: ./backend
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: development
      PORT: 5000
      MONGO_URI: mongodb://mongo:27017/phishguard
      JWT_SECRET: local-compose-secret-change-me
      JWT_EXPIRES_IN: 7d
      CLIENT_URL: http://localhost:5173
      AI_SERVICE_URL: http://ai-service:8000
    depends_on:
      - mongo
      - ai-service

  frontend:
    build:
      context: ./frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  mongo-data:

